databaseChangeLog:
  - changeSet:
      id: 004-create-hotel-arrival-times
      author: George
      changes:
        - createTable:
            tableName: hotel_arrival_times
            columns:
              - column:
                  name: hotel_id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_hotel_arrival_times
                    nullable: false
              - column:
                  name: check_in
                  type: time
                  constraints:
                    nullable: false
              - column:
                  name: check_out
                  type: time

        - addForeignKeyConstraint:
            baseTableName: hotel_arrival_times
            baseColumnNames: hotel_id
            referencedTableName: hotels
            referencedColumnNames: id
            constraintName: fk_hotel_arrival_times_hotel
            onDelete: CASCADE
databaseChangeLog:
  - changeSet:
      id: 002-create-hotel-addresses
      author: George
      changes:
        - createTable:
            tableName: hotel_addresses
            columns:
              - column:
                  name: hotel_id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_hotel_addresses
                    nullable: false
              - column:
                  name: house_number
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: post_code
                  type: varchar(50)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: hotel_addresses
            baseColumnNames: hotel_id
            referencedTableName: hotels
            referencedColumnNames: id
            constraintName: fk_hotel_addresses_hotel
            onDelete: CASCADE

        - createIndex:
            tableName: hotel_addresses
            indexName: idx_hotel_addresses_city
            columns:
              - column:
                  name: city

        - createIndex:
            tableName: hotel_addresses
            indexName: idx_hotel_addresses_country
            columns:
              - column:
                  name: country